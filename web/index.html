<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <title>HDHR Stream</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>HDHR&nbsp;Stream</h1>
    <label class="profile">
      Quality
      <select id="profile"></select>
    </label>
  </header>

  <main>
    <section id="player" class="player hidden">
      <div class="video-wrap">
        <video id="video" controls autoplay playsinline></video>
        <div id="loading" class="loading hidden"><span class="spinner"></span>Tuning…</div>
      </div>
      <div class="player-bar">
        <span id="now-playing"></span>
        <button id="close" type="button">Close</button>
      </div>
      <div id="player-error" class="error hidden"></div>
    </section>

    <nav id="views" class="views hidden">
      <button id="view-live" class="view-tab active" type="button">Live</button>
      <button id="view-recordings" class="view-tab" type="button">Recordings</button>
    </nav>

    <section id="channels" class="grid" aria-live="polite"></section>
    <p id="status" class="status"></p>

    <section id="recordings" class="hidden">
      <div id="series" class="grid"></div>
      <div id="episodes" class="episodes-view hidden">
        <button id="episodes-back" class="back" type="button">← All series</button>
        <h2 id="episodes-title"></h2>
        <div id="episode-list" class="episodes"></div>
      </div>
    </section>
  </main>

  <!-- hls.js for browsers without native HLS (Chrome/Firefox/Android) -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
